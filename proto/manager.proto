syntax = "proto3";

package tigerbeetle.manager;

// Service exposed by each TigerBeetle manager node.
service ManagerNode {
    // Get current node status (process state, backup state, uptime, etc.).
    rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);

    // Start or update the backup cron schedule.
    rpc StartBackup (StartBackupRequest) returns (StartBackupResponse);

    // Stop periodic backups.
    rpc StopBackup (StopBackupRequest) returns (StopBackupResponse);

    // Trigger an immediate one-off backup.
    rpc TriggerBackup (TriggerBackupRequest) returns (TriggerBackupResponse);

    // Update the AWS/S3 backup config (credentials, endpoint, region, etc.).
    // The new config is persisted to the backup_config.toml file and takes
    // effect on the next backup run.
    rpc ModifyBackupConfig (ModifyBackupConfigRequest) returns (ModifyBackupConfigResponse);

    // Get the current AWS/S3 backup config from the backup_config.toml file.
    rpc GetBackupConfig (GetBackupConfigRequest) returns (GetBackupConfigResponse);

    // Stream logs from the TigerBeetle process in real time.
    rpc StreamLogs (StreamLogsRequest) returns (stream LogEntry);

    // Read a page of accounts from the data file (direct binary read).
    rpc ReadAccounts (ReadAccountsRequest) returns (ReadAccountsResponse);

    // Read a page of transfers from the data file (direct binary read).
    rpc ReadTransfers (ReadTransfersRequest) returns (ReadTransfersResponse);

    // Read checkpointed accounts from the LSM (authoritative, with current balances).
    rpc ReadLsmAccounts (ReadAccountsRequest) returns (ReadAccountsResponse);

    // Read checkpointed transfers from the LSM.
    rpc ReadLsmTransfers (ReadTransfersRequest) returns (ReadTransfersResponse);

    // Read pre-checkpoint accounts from the WAL (initial balance values).
    rpc ReadWalAccounts (ReadAccountsRequest) returns (ReadAccountsResponse);

    // Read pre-checkpoint transfers from the WAL.
    rpc ReadWalTransfers (ReadTransfersRequest) returns (ReadTransfersResponse);

    // Format a new TigerBeetle data file on this node.
    // The TigerBeetle process MUST be stopped before calling this.
    // Runs: tigerbeetle format --cluster=N --replica=N --replica-count=N [--size=S] <path>
    rpc FormatDataFile (FormatDataFileRequest) returns (FormatDataFileResponse);

    // Pre-flight migration check — read-only, no side effects.
    // Reads the data file to count accounts, check pending balances, and
    // estimate synthetic transfer count.
    rpc PlanMigration (PlanMigrationRequest) returns (PlanMigrationResponse);

    // Execute migration: read old data file, import into new cluster.
    // Streams progress updates back to the caller.
    // The TigerBeetle process MUST be stopped before calling this (reads old data file).
    rpc ExecuteMigration (ExecuteMigrationRequest) returns (stream MigrationProgress);

    // Browse cached migration accounts with filtering and pagination.
    // Requires a prior PlanMigration call to populate the cache.
    rpc GetMigrationAccounts (GetMigrationAccountsRequest) returns (GetMigrationAccountsResponse);

    // Browse cached migration synthetic transfers with pagination.
    // Requires a prior PlanMigration call to populate the cache.
    rpc GetMigrationSyntheticTransfers (GetMigrationSyntheticTransfersRequest) returns (GetMigrationSyntheticTransfersResponse);
}

// --- Status ---

message GetStatusRequest {}

message GetStatusResponse {
    // Unique node identifier (e.g., "node-0").
    string node_id = 1;
    // TigerBeetle process state.
    ProcessStatus process = 2;
    // Backup configuration and state.
    BackupStatus backup = 3;
    // Node uptime in seconds.
    uint64 uptime_seconds = 4;
    // Data file capacity information.
    DataFileCapacity capacity = 5;
}

enum ProcessState {
    PROCESS_STATE_UNKNOWN = 0;
    PROCESS_STATE_RUNNING = 1;
    PROCESS_STATE_STOPPED = 2;
    PROCESS_STATE_CRASHED = 3;
    PROCESS_STATE_STARTING = 4;
}

message ProcessStatus {
    ProcessState state = 1;
    // OS process ID (0 if not running).
    uint32 pid = 2;
    // TigerBeetle executable path.
    string exe = 3;
    // Arguments passed to TigerBeetle.
    repeated string args = 4;
    // Data file path.
    string data_file = 5;
    // TigerBeetle listen address (e.g., "3000").
    string address = 6;
}

message BackupStatus {
    // Whether periodic backups are enabled.
    bool enabled = 1;
    // Current cron schedule (empty if disabled).
    string cron_schedule = 2;
    // S3 bucket name.
    string bucket = 3;
    // ISO 8601 timestamp of last successful backup (empty if never).
    string last_backup_at = 4;
    // Last backup error message (empty if last succeeded or never ran).
    string last_error = 5;
}

message DataFileCapacity {
    // Total data file size in bytes (= formatted capacity, since the file is pre-allocated).
    uint64 data_file_size_bytes = 1;
    // Total number of grid blocks that fit in the data file.
    uint64 grid_blocks_total = 2;
    // Number of grid blocks occupied by live LSM tables (lower bound).
    uint64 grid_blocks_used = 3;
}

// --- Backup Control ---

message StartBackupRequest {
    // Cron schedule in 5-field format (e.g., "0 0 * * *"). UTC timezone.
    string cron_schedule = 1;
}

message StartBackupResponse {
    bool success = 1;
    string message = 2;
}

message StopBackupRequest {}

message StopBackupResponse {
    bool success = 1;
    string message = 2;
}

message TriggerBackupRequest {}

message TriggerBackupResponse {
    bool success = 1;
    string message = 2;
}

// --- Backup Config ---

message ModifyBackupConfigRequest {
    string aws_endpoint_url = 1;
    string aws_access_key_id = 2;
    string aws_secret_access_key = 3;
    string aws_default_region = 4;
    string aws_request_checksum_calculation = 5;
    string aws_response_checksum_validation = 6;
    // S3 bucket name. Leave empty to keep the current value.
    string bucket = 7;
    // Path to the TigerBeetle data file to back up. Leave empty to keep current.
    string backup_file = 8;
}

message ModifyBackupConfigResponse {
    bool success = 1;
    string message = 2;
}

message GetBackupConfigRequest {}

message GetBackupConfigResponse {
    bool config_file_configured = 1;
    string aws_endpoint_url = 2;
    string aws_access_key_id = 3;
    string aws_secret_access_key = 4;
    string aws_default_region = 5;
    string aws_request_checksum_calculation = 6;
    string aws_response_checksum_validation = 7;
    string bucket = 8;
    string backup_file = 9;
}

// --- Log Streaming ---

message StreamLogsRequest {
    // Number of historical lines to replay (0 = only new lines).
    uint32 tail = 1;
}

enum LogLevel {
    LOG_LEVEL_UNKNOWN = 0;
    LOG_LEVEL_INFO = 1;
    LOG_LEVEL_WARN = 2;
    LOG_LEVEL_ERROR = 3;
}

message LogEntry {
    // ISO 8601 timestamp.
    string timestamp = 1;
    LogLevel level = 2;
    string message = 3;
}

// --- Data File Reader ---

message ReadAccountsRequest {
    // 0-based page index.
    uint32 page = 1;
    // Records per page (max 500).
    uint32 limit = 2;
}

// A single account record decoded from the data file.
// u128 fields are encoded as decimal strings (proto has no u128 type).
message AccountRecord {
    string id = 1;
    string debits_pending = 2;
    string debits_posted = 3;
    string credits_pending = 4;
    string credits_posted = 5;
    string user_data_128 = 6;
    uint64 user_data_64 = 7;
    uint32 user_data_32 = 8;
    uint32 ledger = 9;
    uint32 code = 10;
    uint32 flags = 11;
    uint64 timestamp = 12;
}

message ReadAccountsResponse {
    repeated AccountRecord accounts = 1;
    uint32 page = 2;
    uint32 limit = 3;
}

message ReadTransfersRequest {
    uint32 page = 1;
    uint32 limit = 2;
}

// A single transfer record decoded from the data file.
message TransferRecord {
    string id = 1;
    string debit_account_id = 2;
    string credit_account_id = 3;
    string amount = 4;
    string pending_id = 5;
    string user_data_128 = 6;
    uint64 user_data_64 = 7;
    uint32 user_data_32 = 8;
    uint32 timeout = 9;
    uint32 ledger = 10;
    uint32 code = 11;
    uint32 flags = 12;
    uint64 timestamp = 13;
}

message ReadTransfersResponse {
    repeated TransferRecord transfers = 1;
    uint32 page = 2;
    uint32 limit = 3;
}

// --- Format ---

message FormatDataFileRequest {
    // TigerBeetle cluster ID.
    uint64 cluster_id = 1;
    // Replica index for this node (0-based, e.g., 0–5 for a 6-node cluster).
    uint32 replica = 2;
    // Total number of replicas in the cluster (e.g., 6).
    uint32 replica_count = 3;
    // Optional data file size understood by TigerBeetle (e.g., "1GiB", "128GiB").
    // If empty, TigerBeetle uses its default size.
    string size = 4;
    // Path where the new data file will be written.
    // If empty, uses the node's currently configured data file path.
    string data_file_path = 5;
}

message FormatDataFileResponse {
    bool success = 1;
    string message = 2;
    // Absolute path of the formatted data file.
    string data_file_path = 3;
}

// --- Migration ---

message PlanMigrationRequest {}

message PlanMigrationResponse {
    // Number of accounts found in the data file.
    uint64 accounts = 1;
    // Number of accounts with non-zero debits_pending or credits_pending.
    uint64 pending_transfers = 2;
    // Number of synthetic transfers that will be generated (≤ 2 × accounts).
    uint64 synthetic_transfers = 3;
    // True if pending_transfers == 0 and migration is safe to proceed.
    bool safe = 4;
    // Number of distinct ledgers found.
    uint32 ledgers = 5;
    // Per-ledger breakdown (account count and aggregate balances).
    repeated LedgerSummary ledger_summaries = 6;
    // Accounts with non-zero pending balances (should be empty for safe migrations).
    repeated AccountRecord pending_accounts = 7;
}

message LedgerSummary {
    uint32 ledger = 1;
    uint64 account_count = 2;
    // u128 encoded as decimal string.
    string total_debits_posted = 3;
    // u128 encoded as decimal string.
    string total_credits_posted = 4;
}

message SyntheticTransferRecord {
    string id = 1;
    string debit_account_id = 2;
    string credit_account_id = 3;
    string amount = 4;
    uint32 ledger = 5;
    uint32 code = 6;
    uint64 timestamp = 7;
}

message MigrationAccountFilter {
    optional string id = 1;           // exact match, u128 as string
    optional uint32 ledger = 2;
    optional uint32 code = 3;
    optional uint32 flags = 4;
    optional uint32 user_data_32 = 5;
    optional uint64 user_data_64 = 6;
    optional string user_data_128 = 7; // u128 as string
}

message GetMigrationAccountsRequest {
    uint32 page = 1;
    uint32 limit = 2;    // max 500
    MigrationAccountFilter filter = 3;
}

message GetMigrationAccountsResponse {
    repeated AccountRecord accounts = 1;
    uint32 page = 2;
    uint32 limit = 3;
    uint64 total_count = 4;  // total matching records
}

message GetMigrationSyntheticTransfersRequest {
    uint32 page = 1;
    uint32 limit = 2;    // max 500
    optional uint32 ledger = 3;  // optional ledger filter
}

message GetMigrationSyntheticTransfersResponse {
    repeated SyntheticTransferRecord transfers = 1;
    uint32 page = 2;
    uint32 limit = 3;
    uint64 total_count = 4;
}

message ExecuteMigrationRequest {
    // Cluster ID of the NEW cluster to import into.
    uint64 new_cluster_id = 1;
    // Comma-separated addresses of the new cluster (e.g., "h1:3000,h2:3000,...").
    string new_addresses = 2;
}

message MigrationProgress {
    // Current phase: "genesis_accounts", "accounts", or "transfers".
    string phase = 1;
    // Records imported so far in current phase.
    uint64 imported = 2;
    // Total records to import in current phase.
    uint64 total = 3;
    // True when migration is fully complete.
    bool done = 4;
    // Error message (non-empty only on failure).
    string error = 5;
}
